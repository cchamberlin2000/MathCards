<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Flashcards</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MathCards">

    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            asciimath2jax: { delimiters: [['`','`']], preview: "none" },
            "HTML-CSS": { 
                linebreaks: { automatic: true, width: "container" }, 
                imageFont: null,
                scale: 90
            },
            displayAlign: "center", messageStyle: "none"
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=AM_CHTML"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css">

    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            background: #0f172a; 
            overscroll-behavior-y: none; /* Stops the mobile rubber-band/bounce effect */
        }

        /* Animation for when the next card scales up to the front (Forward) */
        @keyframes slideUpToFront {
            from { transform: scale(0.95) translateY(15px); opacity: 0.5; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-to-front {
            animation: slideUpToFront 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .flip-card {
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s; transform-style: preserve-3d;
        }
        .flip-card-inner.flipped { transform: rotateY(180deg); }
        
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border: 3px solid #4f46e5;
            border-radius: 1.5rem; padding: 1.5rem;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            font-size: clamp(0.9rem, 4.5vw, 1.3rem); 
            box-sizing: border-box;
            word-break: break-word;
            background: white;
        }
        .flip-card-back { transform: rotateY(180deg); }

        .card-checkbox-overlay {
            position: absolute; top: 1.25rem; right: 1.25rem; z-index: 50; 
            width: 28px; height: 28px; cursor: pointer; accent-color: #4f46e5;
        }

        .nav-zone {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50px; height: 80px; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; z-index: 60; transition: opacity 0.2s;
            opacity: 0; background: rgba(79, 70, 229, 0.9);
            color: white; border-radius: 8px; font-size: 20px;
        }
        
        @media (hover: hover) { .nav-zone:hover:not(.disabled) { opacity: 1; } }
        @media (hover: none) { .nav-zone { opacity: 0.2; width: 40px; } }

        .nav-zone.left { left: -60px; }
        .nav-zone.right { right: -60px; }

        @media (max-width: 640px) {
            .nav-zone.left { left: 5px; }
            .nav-zone.right { right: 5px; }
        }

        .nav-zone.disabled { pointer-events: none; visibility: hidden; }
        .MathJax_Display { display: inline !important; margin: 0 !important; }

        .icon-btn {
            width: 44px; height: 44px; display: flex;
            align-items: center; justify-content: center;
            border-radius: 50%; background: white;
            border: 1px solid #e2e8f0; color: #64748b;
            font-size: 20px; cursor: pointer;
        }

        /* Scalable Math Container for Equation of Plane fix */
        .flip-card-front div, .flip-card-back div {
            width: 100%;
            overflow-wrap: break-word;
        }
        .mjx-chtml {
            max-width: 100% !important;
            display: inline-block !important;
        }

        .math-font {
            font-family: "Computer Modern Serif", "Times New Roman", serif;
            /* Turn off Tailwind's aggressive font-thinning just for the math variables */
            -webkit-font-smoothing: auto;
            -moz-osx-font-smoothing: auto;
        }

        /* Specifically target the bold math variables to make them pop */
        b.math-font {
            font-weight: 700;
            /* This tiny shadow acts as a microscopic stroke to darken the font */
            text-shadow: 0.3px 0.3px 0px currentColor; 
        }

    </style>
</head>
<body class="min-h-screen text-slate-100 overflow-x-hidden">
    <div id="app" class="p-4 md:p-8">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl font-bold text-white mb-6 text-center">Flashcards</h1>
            <div id="content"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'math_flashcards_v93';
        
        let sets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [{
            id: Date.now(),
            name: "Calculus 3",
            cards: [
                { 
                    id: 1, 
                    question: "What is a vector?", 
                    answer: "A list of `n` numbers (or a point or an arrow) in `RR^n`.", 
                    checked: false 
                },
                { 
                    id: 2, 
                    question: "How do we add scaled vectors?", 
                    answer: "Algebraically (entry-wise) & geometrically (parallelogram/triangle law).", 
                    checked: false 
                },
                { 
                    id: 3, 
                    question: "What is a linear combination of a set of <i class='math-font'>k</i> vectors, {<b class='math-font'>v</b>₁, <b class='math-font'>v</b>₂, ... , <b class='math-font'>v</b>ₖ}?", 
                    answer: "Another vector, `x_1 bb(v)_1 + x_2 bb(v)_2 + ... + x_k bb(v)_k`, where the scalars `x_i` are real numbers.", 
                    checked: false 
                },
                { 
                    id: 4, 
                    question: "What is a span of a set of vectors?", 
                    answer: "The set of all possible linear combinations of those vectors.", 
                    checked: false 
                },
                { 
                    id: 5, 
                    question: "What is a vector equation equivalent to?", 
                    answer: "Its related linear system of equations.", 
                    checked: false 
                },
                { 
                    id: 6, 
                    question: "How do you check if a linear system is consistent using spans?", 
                    answer: "Check if the column vector on the end of its augmented matrix is in the span of the other column vectors.", 
                    checked: false 
                },
                { 
                    id: 7, 
                    question: "What geometric shapes do single and double vectors span?", 
                    answer: "A single nonzero vector spans a line. Two nonzero vectors that aren't scalar multiples span a plane.", 
                    checked: false 
                },
                { 
                    id: 8, 
                    question: "What constitutes a solution to a system of linear equations in <i class='math-font'>n</i> variables?", 
                    answer: "A vector (or point) in `RR^n` with entries that satisfy each equation.", 
                    checked: false 
                },
                { 
                    id: 9, 
                    question: "What is an inconsistent system?", 
                    answer: "A system of equations with no solutions.", 
                    checked: false 
                },
                { 
                    id: 10, 
                    question: "A matrix is in <b>Row Echelon Form</b> (REF) if it satisfies the following criteria: <br><br> 1. All zero rows are __________________. <br><br> 2. The first nonzero entry of a row (called a __________________ ) is __________________ <br><br> 3. Below the pivots __________________.", 
                    answer: "1. ... at the bottom of the matrix. <br><br> 2. ... <b>pivot</b> ... to the right of the first nonzero entry of the row above. <br><br> 3. ... all entries are zero.", 
                    checked: false 
                },
                { 
                    id: 11, 
                    question: "What is the primary benefit of reducing an augmented matrix to Row Echelon Form (REF)?", 
                    answer: "It corresponds to a system of linear equations that can be easily solved by back substitution.", 
                    checked: false 
                },
                { 
                    id: 12, 
                    question: "What is the primary benefit of Reduced Row Echelon Form (RREF)?", 
                    answer: "It corresponds to a system of linear equations that can be easily solved just by looking.", 
                    checked: false 
                },
                { 
                    id: 13, 
                    question: "In Gaussian Elimination, what are the three allowable row operations that, when applied to an augmented matrix, yield another augmented matrix corresponding to a system with the same solution set?", 
                    answer: "1. Row swaps <br><br> 2. Row scales (multiply a row by a scalar) <br><br> 3. Row replacements (new row is a sum of multiples of two rows)", 
                    checked: false 
                },
                { 
                    id: 14, 
                    question: "How can you tell a system is inconsistent strictly from its REF?", 
                    answer: "The REF of its augmented matrix has a pivot in the last column.", 
                    checked: false 
                },
                { 
                    id: 15, 
                    question: "If every column except the last in an augmented matrix is a pivot column, what does this mean?", 
                    answer: "The system has a unique solution.", 
                    checked: false 
                },
                { 
                    id: 16, 
                    question: "What do columns without pivots correspond to in a coefficient matrix?", 
                    answer: "Free variables.", 
                    checked: false 
                },
                { 
                    id: 17,
                    question: "If the equation <i class='math-font'>A</i><b class='math-font'>x</b> = <b class='math-font'>b</b> has a solution, what must be true about vector <b class='math-font'>b</b>?", 
                    answer: "`bb(b)` is in the span of columns of `A`.", 
                    checked: false 
                },
                { 
                    id: 18, 
                    question: "To obtain the <i class='math-font'>i</i>&thinsp;th entry in <i class='math-font'>A</i><b class='math-font'>v</b> using the <b>Dot Product Way</b>, _____________________ ", 
                    answer: "... take the dot product of the `i`th row of `A` with the vector `bb(v)`.", 
                    checked: false 
                },
                { 
                    id: 19, 
                    question: "To apply the <b>Column Way</b> of multiplying <i class='math-font'>A</i><b class='math-font'>v</b>, _____________________ ", 
                    answer: "... multiply the columns of `A` times the corresponding entries of `bb(v)` and sum.", 
                    checked: false 
                },
                { 
                    id: 20, 
                    question: "A linear combination of a set of vectors is really _____________________ ", 
                    answer: "... a matrix-vector multiplication in disguise.", 
                    checked: false 
                },
                { 
                    id: 21, 
                    question: "According to the Spanning Theorem for an <i class='math-font'>m</i> &times; <i class='math-font'>n</i> matrix <i class='math-font'>A</i>, what three statements are equivalent?", 
                    answer: "1. `A bb(x) = bb(b)` has a solution for all `bb(b)`. <br><br> 2. The span of the columns of `A` is `RR^m`. <br><br> 3. `A` has a pivot in each row.", 
                    checked: false 
                },
                { 
                    id: 22, 
                    question: "What are four equivalent ways to say that vector <b class='math-font'>b</b> is in the span of a set of vectors?", 
                    answer: "1. `bb(b)` is in `text(Span){bb(v)_1, bb(v)_2, ..., bb(v)_k}` <br><br> 2. `bb(b)` is a linear combination of `bb(v)_1, bb(v)_2, ..., bb(v)_k` . <br><br> 3. The vector equation `x_1 bb(v)_1 + x_2 bb(v)_2 + ... + x_k bb(v)_k = bb(b)` has at least one solution. <br><br> 4. The system corresponding to `A bb(x) = bb(b)` is consistent.", 
                    checked: false 
                },
                { 
                    id: 23, 
                    question: "If <i class='math-font'>A</i><b class='math-font'>x</b> = <b class='math-font'>b</b> is consistent and <b class='math-font'>x</b> = <b class='math-font'>p</b> is a particular solution, what form do all solutions take?", 
                    answer: "`bb(x) = bb(p) + bb(x)_h` <br><br> where `bb(x)_h` is a solution to the homogeneous equation `A bb(x) = bb(0)`.", 
                    checked: false 
                },
                { 
                    id: 24, 
                    question: "What defines a linearly independent set of vectors?", 
                    answer: "The vector equation `x_1 bb(v)_1 + x_2 bb(v)_2 + ... + x_k bb(v)_k = bb(0)` has only the trivial solution.", 
                    checked: false 
                },
                { 
                    id: 25, 
                    question: "How do you test a set of vectors for linear independence using a matrix?", 
                    answer: "Make them columns of a matrix `A`, and transform to RREF. If there are any free columns, the vectors are dependent.", 
                    checked: false 
                },
                { 
                    id: 26, 
                    question: "What does the number of pivot columns in a matrix tell you about its span?", 
                    answer: "The number of pivot columns is the dimension of the span of the columns.", 
                    checked: false 
                },
                { 
                    id: 27, 
                    question: "What three conditions must a subset <i class='math-font'>V</i> of a vector space satisfy to be a subspace?", 
                    answer: "1. It must contain the zero vector, `bb(0)`. <br><br> 2. It must be closed under vector addition. <br><br> 3. It must be closed under scalar multiplication.", 
                    checked: false 
                },
                { 
                    id: 28, 
                    question: "How do you find a spanning set for the Null Space, Nul(<i class='math-font'>A</i>)?", 
                    answer: "Solve `A bb(x) = bb(0)` in vector parametric form.", 
                    checked: false 
                },
                { 
                    id: 29, 
                    question: "How do you find a spanning set for the Column Space, Col(<i class='math-font'>A</i>)?", 
                    answer: "Take the pivot columns of `A` (not the reduced `A`).", 
                    checked: false 
                },
                { 
                    id: 30, 
                    question: "What are three common examples of subspaces?", 
                    answer: "1. Span <br><br> 2. Column space <br><br> 3. Null space", 
                    checked: false 
                },
                { 
                    id: 31, 
                    question: "What defines a basis for a subspace <i class='math-font'>V</i> of &#8477;<sup><i class='math-font'>n</i></sup>?", 
                    answer: "A linearly independent set of vectors that spans `V`. The number of vectors in the basis is the dimension of `V`.", 
                    checked: false 
                },
                { 
                    id: 32, 
                    question: "According to the Basis Theorem, if <i class='math-font'>V</i> is a <i class='math-font'>k</i>-dimensional subspace, a subset ℬ of vectors is a basis if it has two of what three properties?", 
                    answer: "1. ℬ spans `V` <br><br> 2. ℬ is linearly independent <br><br> 3. ℬ contains `k` vectors", 
                    checked: false 
                },
                { 
                    id: 33, 
                    question: "If ℬ is a basis for a subspace <i class='math-font'>V</i>, how many ways can a vector <b class='math-font'>x</b> in <i class='math-font'>V</i> be written as a linear combination of the basis vectors?", 
                    answer: "In exactly one way.", 
                    checked: false 
                },
                { 
                    id: 34, 
                    question: "How do you transform a vector from a non-standard basis ℬ into the standard basis <i class='math-font'>S</i>?", 
                    answer: "Multiply the matrix formed by the ℬ-basis vectors times the given ℬ-vector.", 
                    checked: false 
                },
                { 
                    id: 35, 
                    question: "How do you transform a vector from the standard basis <i class='math-font'>S</i> into a non-standard basis ℬ?", 
                    answer: "Multiply the inverse of the matrix formed by the ℬ-basis vectors times the given `S`-vector.", 
                    checked: false 
                },
                { 
                    id: 36, 
                    question: "What is the rank of a matrix <i class='math-font'>A</i>, and how is it found?", 
                    answer: "The rank is the dimension of the column space, `text(Col)(A)`. It is equal to the number of pivot columns.",

                },
                { 
                    id: 37, 
                    question: "What is the nullity of a matrix <i class='math-font'>A</i>, and how is it found?",

                },
                { 
                    id: 38,

                    checked: false 
                },
                { 
                    id: 39, 
                    question: "For a linear transformation <i class='math-font'>T</i>(<b class='math-font'>x</b>) = <i class='math-font'>A</i><b class='math-font'>x</b> where <i class='math-font'>A</i> is an <i class='math-font'>m</i> &times; <i class='math-font'>n</i> matrix, what are its domain, codomain, and range?", 
                    answer: "1. Domain: `RR^n` <br><br> 2. Codomain: `RR^m` <br><br> 3. Range: `text(Col)(A)`", 
                    checked: false 
                },
                { 
                    id: 40, 
                    question: "How do you find the <i class='math-font'>i</i>&thinsp;th column of the standard matrix <i class='math-font'>A</i> for a linear transformation <i class='math-font'>T</i>?", 
                    answer: "The `i`th column is given by `T(bb(e)_i)`, where `bb(e)_i` is the `i`th standard basis vector.", 
                    checked: false 
                },
                { 
                    id: 41, 
                    question: "What are four equivalent ways to state that a linear transformation <i class='math-font'>T</i>(<b class='math-font'>x</b>) = <i class='math-font'>A</i><b class='math-font'>x</b> from &#8477;<sup><i class='math-font'>n</i></sup> to &#8477;<sup><i class='math-font'>m</i></sup> is <b>one-to-one</b>?", 
                    answer: "1. `T(bb(x)) = bb(b)` has at most one solution for all `bb(b)`. <br><br> 2. `A bb(x) = bb(0)` has only the trivial solution. <br><br> 3. `A` has a pivot position in every column. <br><br> 4. `text(rank)(A) = n`", 
                    checked: false 
                },
                { 
                    id: 42, 
                    question: "What are four equivalent ways to state that a linear transformation <i class='math-font'>T</i>(<b class='math-font'>x</b>) = <i class='math-font'>A</i><b class='math-font'>x</b> from &#8477;<sup><i class='math-font'>n</i></sup> to &#8477;<sup><i class='math-font'>m</i></sup> is <b>onto</b>?", 
                    answer: "1. `T(bb(x)) = bb(b)` has at least one solution for all `bb(b)` in `RR^m`. <br><br> 2. `text(Col)(A) = RR^m` <br><br> 3. `A` has a pivot position in every row. <br><br> 4. `text(dim)(text(range)(T)) = text(dim)(text(Col)(A)) = m`", 
                    checked: false 
                },
                { 
                    id: 43, 
                    question: "What two conditions must be satisfied for a transformation <i class='math-font'>T</i> to be linear?",

                },
                { 
                    id: 44, 
                    question: "What is the standard matrix to rotate a vector in &#8477;<sup>2</sup> by an angle &theta;?",

                    checked: false 
                },
                { 
                    id: 45, 
                    question: "How do you multiply matrices <i class='math-font'>A</i> and <i class='math-font'>B</i> using the <b>Dot Product Way</b>?",

                    checked: false 
                },
                { 
                    id: 46, 
                    question: "How do you multiply matrices <i class='math-font'>A</i> and <i class='math-font'>B</i> using the <b>Column Way</b>?",

                    checked: false 
                },
                { 
                    id: 47, 
                    question: "How do you multiply matrices <i class='math-font'>A</i> and <i class='math-font'>B</i> using the <b>Row Way</b>?", 
                    answer: "`(i text(th row of ) A)B = i text(th row of ) AB`", 
                    checked: false 
                },
                { 
                    id: 48,

                },
                { 
                    id: 49, 
                    question: "If matrix <i class='math-font'>A</i> goes with transformation <i class='math-font'>T</i> and matrix <i class='math-font'>B</i> goes with transformation <i class='math-font'>U</i>, what is the standard matrix for the composition (<i class='math-font'>T</i> &#8728; <i class='math-font'>U</i>)(<b class='math-font'>x</b>)?",

                    checked: false 
                },
                { 
                    id: 50, 
                    question: "How do you calculate the inverse of a square matrix <i class='math-font'>A</i> by hand?",

                },
                { 
                    id: 51, 
                    question: "How can you use an inverse matrix to solve the system <i class='math-font'>A</i><b class='math-font'>x</b> = <b class='math-font'>b</b>?",

                },
                { 
                    id: 52, 
                    question: "According to the Invertible Matrix Theorem, if an <i class='math-font'>n</i> &times; <i class='math-font'>n</i> matrix <i class='math-font'>A</i> is invertible, what does that imply about its pivots and columns?", 
                    answer: "1. `A` has `n` pivots. <br><br> 2. The columns of `A` are linearly independent. <br><br> 3. The columns of `A` form a basis of `RR^n`.",

                },
                { 
                    id: 53, 
                    question: "According to the Invertible Matrix Theorem, if an <i class='math-font'>n</i> &times; <i class='math-font'>n</i> matrix <i class='math-font'>A</i> is invertible, what does that imply about the transformation <i class='math-font'>T</i>(<b class='math-font'>x</b>) = <i class='math-font'>A</i><b class='math-font'>x</b>?", 
                    answer: "The transformation `T` is both one-to-one and onto.", 
                    checked: false 
                },
                { 
                    id: 54, 
                    question: "What is the determinant of a 2 &times; 2 matrix <i class='math-font'>A</i>?", 
                    answer: "`text(det) A = |[a_11, a_12],[a_21, a_22]|` <br><br> `= a_11 a_22 - a_12 a_21`", 
                    checked: false 
                },
                { 
                    id: 55, 
                    question: "In cofactor expansion, what is the formula for the cofactor <i class='math-font'>C<sub>ij</sub></i>?", 
                    answer: "`C_{ij} = (-1)^{i+j} M_{ij}` <br><br> where the minor `M_{ij}` is the determinant of the submatrix derived by eliminating the `i`th row and `j`th column.", 
                    checked: false 
                },
                { 
                    id: 56, 
                    question: "When computing a determinant using cofactor expansion, which row or column should you choose?", 
                    answer: "Expand about the row or column with the most zero entries to minimize the number of terms.", 
                    checked: false 
                },
                { 
                    id: 57, 
                    question: "What is the determinant of a triangular matrix?", 
                    answer: "The product of its main diagonal entries.", 
                    checked: false 
                },
                { 
                    id: 58, 
                    question: "If a matrix <i class='math-font'>A</i> has a row or column of zeros, or a repeated (or dependent) row or column, what is its determinant?", 
                    answer: "`text(det) A = 0`", 
                    checked: false 
                },
                { 
                    id: 59,

        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sets)); }
        
        let currentSet = null;
        let studyMode = false;
        let currentCardIndex = 0;
        let isFlipped = false;
        let activeStudyCards = [];
        let navDirection = 'forward'; 

        function render() {
            const content = document.getElementById('content');
            const title = document.querySelector('h1');
            if (studyMode) { 
                content.innerHTML = renderStudyMode(); 
                title.classList.add('hidden'); 
            } else if (!currentSet) { 
                content.innerHTML = renderSetsList(); 
                title.classList.remove('hidden'); 
            } else { 
                content.innerHTML = renderSetEditor(); 
                title.classList.remove('hidden'); 
            }
            setTimeout(() => { if (window.MathJax) MathJax.Hub.Queue(['Typeset', MathJax.Hub, content]); }, 50);
        }

        function renderSetsList() {
            let html = '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">';
            sets.forEach(set => {
                html += `<div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-xl font-bold mb-1 text-slate-800">${escapeHtml(set.name)}</h3>
                    <p class="text-slate-500 mb-4">${set.cards.length} cards</p>
                    <button onclick="openSet(${set.id})" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold">Open Set</button>
                </div>`;
            });
            html += `<button onclick="createNewSet()" class="border-2 border-dashed border-slate-300 p-6 rounded-2xl text-slate-400 font-bold">+ New Set</button></div>`;
            return html;
        }

        function renderSetEditor() {
            const starredCount = currentSet.cards.filter(c => c.checked).length;
            const allChecked = starredCount === currentSet.cards.length && currentSet.cards.length > 0;
            let html = `<div class="flex flex-col gap-4 mb-6">
                <div class="flex items-center justify-between">
                    <button onclick="backToSets()" class="text-indigo-400 font-bold p-2">← All Sets</button>
                    <div class="flex gap-2">
                        <button onclick="startStudy(false)" class="px-4 py-2 bg-slate-700 text-white rounded-full text-sm font-bold">Study All</button>
                        <button onclick="startStudy(true)" ${starredCount === 0 ? 'disabled' : ''} class="px-4 py-2 bg-indigo-600 text-white rounded-full text-sm font-bold shadow-lg disabled:opacity-30">Checked (${starredCount})</button>
                    </div>
                </div>
                <div class="flex justify-end">
                    <button onclick="toggleAllCards()" class="text-xs font-bold text-slate-400 uppercase tracking-wider">${allChecked ? 'Uncheck All' : 'Check All'}</button>
                </div>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl mb-8 border border-slate-700">
                <h3 class="font-bold text-indigo-300 mb-4 text-sm uppercase">Add New Card</h3>
                <div class="space-y-3">
                    <input id="newQ" type="text" placeholder="Question" class="w-full p-3 rounded-xl bg-slate-900 border-none text-white ring-1 ring-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
                    <input id="newA" type="text" placeholder="Answer" class="w-full p-3 rounded-xl bg-slate-900 border-none text-white ring-1 ring-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="addNewCard()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">Add to Set</button>
                </div>
            </div>
            <div class="space-y-3 pb-20">`;
            currentSet.cards.forEach((card, i) => {
                html += `<div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-start">
                    <div class="flex-1 pr-4">
                        <div class="text-xs font-bold text-slate-500 uppercase mb-1">Card ${i+1}</div>
                        <div class="text-slate-100 font-medium">${card.question}</div>
                        <div class="text-indigo-300 text-sm mt-1">${card.answer}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" class="card-checkbox" ${card.checked ? 'checked' : ''} onchange="toggleCheck(${i})">
                        <button onclick="deleteCard(${i})" class="text-slate-500 p-1 text-2xl">&times;</button>
                    </div></div>`;
            });
            return html + '</div>';
        }

        function renderStudyMode() {
            const card = activeStudyCards[currentCardIndex];
            const masterIndex = currentSet.cards.findIndex(c => c.id === card.id);
            const isChecked = currentSet.cards[masterIndex].checked;
            
            return `<div class="w-full max-w-xl mx-auto flex flex-col min-h-[85vh] relative">
                <div class="flex justify-center mb-6">
                    <div class="px-3 py-1 bg-slate-800 rounded-full text-xs font-bold text-slate-400">${currentCardIndex + 1} / ${activeStudyCards.length}</div>
                </div>
                <div class="relative flex-1 flex flex-col items-center justify-center w-full">
                    <div class="w-[90vw] max-w-[400px] flex justify-between mb-4 px-1">
                        <button onclick="shuffleCards()" class="icon-btn">↺</button>
                        <button onclick="exitStudy()" class="icon-btn">✕</button>
                    </div>
                    
                    <div class="relative flex items-center justify-center w-full">
                        <div class="nav-zone left ${currentCardIndex === 0 ? 'disabled' : ''}" onclick="triggerSwipeOut('prev')">←</div>
                        
                        <div class="relative" style="width: 90vw; max-width: 400px; height: 60vh; max-height: 550px; touch-action: none;">
                            
                            ${currentCardIndex < activeStudyCards.length - 1 ? `
                                <div class="absolute inset-0 z-0" style="transform: scale(0.95) translateY(15px); opacity: 0.5; pointer-events: none;">
                                    <div class="flip-card-front text-slate-900 shadow-xl" style="position: relative; width: 100%; height: 100%;">
                                        <div>${activeStudyCards[currentCardIndex + 1].question}</div>
                                    </div>
                                </div>
                            ` : ''}

                            <div id="active-card" class="absolute inset-0 z-10 flip-card ${navDirection === 'forward' ? 'animate-to-front' : ''} cursor-pointer" onclick="flipCard()" style="margin: 0; width: 100%; height: 100%;">
                                <input type="checkbox" class="card-checkbox-overlay" ${isChecked ? 'checked' : ''} onclick="event.stopPropagation(); syncCheck(${masterIndex})">
                                <div class="flip-card-inner ${isFlipped ? 'flipped' : ''}">
                                    <div class="flip-card-front text-slate-900 shadow-xl"><div>${card.question}</div></div>
                                    <div class="flip-card-back text-slate-900 shadow-xl"><div>${card.answer}</div></div>
                                </div>
                            </div>
                            
                            ${currentCardIndex > 0 ? `
                                <div id="prev-card" class="absolute inset-0 z-20 pointer-events-none" style="transform: translateX(-150vw) rotate(-15deg);">
                                    <div class="flip-card-front text-slate-900 shadow-2xl" style="position: relative; width: 100%; height: 100%;">
                                        <div>${activeStudyCards[currentCardIndex - 1].question}</div>
                                    </div>
                                </div>
                            ` : ''}

                        </div>

                        <div class="nav-zone right ${currentCardIndex === activeStudyCards.length - 1 ? 'disabled' : ''}" onclick="triggerSwipeOut('next')">→</div>
                    </div>
                </div>
            </div>`;
        }

        function toggleCheck(index) { currentSet.cards[index].checked = !currentSet.cards[index].checked; saveData(); render(); }
        function syncCheck(masterIndex) { currentSet.cards[masterIndex].checked = !currentSet.cards[masterIndex].checked; saveData(); }
        
        function startStudy(onlyChecked) {
            activeStudyCards = onlyChecked ? currentSet.cards.filter(c => c.checked) : [...currentSet.cards];
            if (activeStudyCards.length === 0) return;
            studyMode = true; currentCardIndex = 0; isFlipped = false; navDirection = 'forward'; 
            
            // Lock body scrolling completely when studying
            document.body.style.overflow = 'hidden';
            render();
        }
        
        function addNewCard() {
            const q = document.getElementById('newQ').value;
            const a = document.getElementById('newA').value;
            if (q && a) { currentSet.cards.push({ id: Date.now(), question: q, answer: a, checked: false }); saveData(); render(); }
        }
        function deleteCard(index) { if(confirm("Delete card?")) { currentSet.cards.splice(index, 1); saveData(); render(); } }
        function createNewSet() {
            const name = prompt("Set name:");
            if (name) { sets.push({ id: Date.now(), name: name, cards: [] }); saveData(); render(); }
        }
        
        function flipCard() {
            if (typeof swipeDistance !== 'undefined' && swipeDistance > 15) return;
            isFlipped = !isFlipped;
            const inner = document.querySelector('.flip-card-inner');
            if (inner) {
                inner.classList.toggle('flipped', isFlipped);
                setTimeout(() => { if (window.MathJax) MathJax.Hub.Queue(['Typeset', MathJax.Hub, inner]); }, 100);
            }
        }
        
        function nextCard() { if (currentCardIndex < activeStudyCards.length - 1) { currentCardIndex++; isFlipped = false; navDirection = 'forward'; render(); } }
        function prevCard() { if (currentCardIndex > 0) { currentCardIndex--; isFlipped = false; navDirection = 'backward'; render(); } }
        
        function openSet(id) { currentSet = sets.find(s => s.id === id); render(); }
        
        function backToSets() { 
            currentSet = null; studyMode = false; 
            document.body.style.overflow = ''; // Restore normal page scrolling
            render(); 
        }
        function exitStudy() { 
            studyMode = false; 
            document.body.style.overflow = ''; // Restore normal page scrolling
            render(); 
        }
        function shuffleCards() { activeStudyCards.sort(() => Math.random() - 0.5); currentCardIndex = 0; isFlipped = false; navDirection = 'forward'; render(); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        function toggleAllCards() {
            const anyUnchecked = currentSet.cards.some(c => !c.checked);
            currentSet.cards.forEach(c => c.checked = anyUnchecked);
            saveData(); render();
        }

        // --- REAL-TIME TOUCH / SWIPE LOGIC ---
        let touchstartX = 0;
        let touchstartY = 0;
        let isDragging = false;
        let activeCardEl = null;
        let prevCardEl = null;
        let swipeDistance = 0; 

        document.addEventListener('touchstart', e => {
            if (!studyMode || !e.target.closest('#active-card')) return;
            
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
            isDragging = true;
            swipeDistance = 0;
            
            activeCardEl = document.getElementById('active-card');
            prevCardEl = document.getElementById('prev-card');
            
            if (activeCardEl) activeCardEl.style.transition = 'none'; 
            if (prevCardEl) prevCardEl.style.transition = 'none'; 
        }, { passive: true });

        // Changed to passive: false so we can preventDefault() and stop native mobile scrolling
        document.addEventListener('touchmove', e => {
            if (!studyMode) return;
            
            // Actively block any background scrolling while a user is swiping the card
            if (isDragging) {
                e.preventDefault();
            }

            if (!isDragging || !activeCardEl) return;
            
            let currentX = e.changedTouches[0].screenX;
            let currentY = e.changedTouches[0].screenY;
            let deltaX = currentX - touchstartX;
            let deltaY = currentY - touchstartY;

            if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaX) < 15) return;

            if (deltaX < 0) { 
                let rotate = deltaX * 0.05; 
                activeCardEl.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;
                if (prevCardEl) prevCardEl.style.transform = `translateX(-150vw) rotate(-15deg)`; 
            } else { 
                activeCardEl.style.transform = `translateX(0px) rotate(0deg)`; 
                if (prevCardEl) {
                    let cardWidth = activeCardEl.offsetWidth;
                    let offset = -cardWidth + deltaX;
                    if (offset > 0) offset = 0; 
                    let rotate = (offset / cardWidth) * 15; 
                    prevCardEl.style.transform = `translateX(${offset}px) rotate(${rotate}deg)`;
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', e => {
            if (!studyMode || !isDragging || !activeCardEl) return;
            isDragging = false;
            
            let touchendX = e.changedTouches[0].screenX;
            let deltaX = touchendX - touchstartX;
            swipeDistance = Math.abs(deltaX);
            const swipeThreshold = 80;

            activeCardEl.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
            if (prevCardEl) prevCardEl.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';

            if (deltaX < -swipeThreshold && currentCardIndex < activeStudyCards.length - 1) {
                activeCardEl.style.transform = `translateX(-150vw) rotate(-15deg)`;
                activeCardEl.style.opacity = '0';
                setTimeout(() => nextCard(), 300);
            } else if (deltaX > swipeThreshold && currentCardIndex > 0) {
                if (prevCardEl) {
                    prevCardEl.style.transform = `translateX(0px) rotate(0deg)`;
                }
                setTimeout(() => prevCard(), 300);
            } else {
                activeCardEl.style.transform = `translateX(0px) rotate(0deg)`;
                if (prevCardEl) {
                    prevCardEl.style.transform = `translateX(-150vw) rotate(-15deg)`;
                }
            }
        }, { passive: true });

        function triggerSwipeOut(direction) {
            const activeCard = document.getElementById('active-card');
            const prevCardEl = document.getElementById('prev-card');
            
            if (direction === 'next') { 
                if (activeCard && currentCardIndex < activeStudyCards.length - 1) {
                    activeCard.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
                    activeCard.style.transform = 'translateX(-150vw) rotate(-15deg)';
                    activeCard.style.opacity = '0';
                    setTimeout(() => nextCard(), 300);
                }
            } else if (direction === 'prev') { 
                if (prevCardEl && currentCardIndex > 0) {
                    prevCardEl.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
                    prevCardEl.style.transform = 'translateX(0px) rotate(0deg)';
                    setTimeout(() => prevCard(), 300);
                }
            }
        }

        render();
    </script>
</body>
